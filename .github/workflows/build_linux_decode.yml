name: "Build Linux decode launcher"

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release and upload built assets"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Tag to release when manually dispatched (example: v0.6.0)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-decode:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            appimagetool: appimagetool-x86_64.AppImage
            appimage_arch: x86_64
            artifact_suffix: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            appimagetool: appimagetool-aarch64.AppImage
            appimage_arch: aarch64
            artifact_suffix: arm64

    name: Build decode-light AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      SETUPTOOLS_RUST_CARGO_PROFILE: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(bash scripts/ci/git-version.sh)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build tape-decode binary (single)
        if: matrix.arch != 'x86_64'
        run: cargo build --release --target "${{ matrix.target }}" --bin tape-decode

      - name: Build tape-decode binaries (x86-64 v1-v4)
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          build_level() {
            local level="$1"
            local rustflags=""
            case "$level" in
              v1) rustflags="-C target-feature=+sse2" ;;
              v2) rustflags="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2" ;;
              v3) rustflags="-C target-feature=+avx,+avx2" ;;
              v4) rustflags="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl" ;;
            esac
            echo "::group::Build ${level}"
            CARGO_TARGET_DIR="target-${level}" RUSTFLAGS="$rustflags" \
              cargo build --release --target "${{ matrix.target }}" --bin tape-decode
            echo "::endgroup::"
          }
          for level in v1 v2 v3 v4; do
            build_level "$level"
          done

      - name: Install launcher packaging dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller -r requirements-launcher.txt

      - name: Build launcher binary
        if: matrix.arch != 'x86_64'
        env:
          TAPE_DECODE_BIN: target/${{ matrix.target }}/release/tape-decode
        run: python3 scripts/ci/build-linux-decode-bin.py

      - name: Build launcher binary (with microarch levels)
        if: matrix.arch == 'x86_64'
        # TAPE_DECODE_BIN omitted; packaging script discovers target-x86-64-vN/...
        run: python3 scripts/ci/build-linux-decode-bin.py

      - name: Build AppDir and AppImage
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/decode-light AppDir/usr/bin/decode-light
          chmod +x AppDir/usr/bin/decode-light

          cp resources/appimage/decode-light.desktop AppDir/usr/share/applications/decode-light.desktop
          cp resources/appimage/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

          python3 - <<'PY'
          import base64
          from pathlib import Path
          icon = base64.b64decode("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO0N6xQAAAAASUVORK5CYII=")
          Path("AppDir/usr/share/icons/hicolor/256x256/apps/decode-light.png").write_bytes(icon)
          PY

          ln -sf usr/share/applications/decode-light.desktop AppDir/decode-light.desktop
          ln -sf usr/share/icons/hicolor/256x256/apps/decode-light.png AppDir/decode-light.png

          APPIMAGE_TOOL="${{ matrix.appimagetool }}"
          APPIMAGE_NAME="linux_decode-light_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.AppImage"

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/${APPIMAGE_TOOL}"
          chmod +x "${APPIMAGE_TOOL}"
          "./${APPIMAGE_TOOL}" --appimage-extract
          env -u SOURCE_DATE_EPOCH ARCH=${{ matrix.appimage_arch }} ./squashfs-root/AppRun AppDir "${APPIMAGE_NAME}"
          chmod +x "${APPIMAGE_NAME}"

          APPIMAGE_EXTRACT_AND_RUN=1 "./${APPIMAGE_NAME}" list-profiles > /tmp/decode-light_profiles.txt
          grep -q "PAL_VHS" /tmp/decode-light_profiles.txt

          ZIP_NAME="linux_decode-light_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.zip"
          zip -j "${ZIP_NAME}" "${APPIMAGE_NAME}"
          test -f "${ZIP_NAME}"
          test "$(unzip -Z1 "${ZIP_NAME}" | wc -l)" -eq 1

      - name: Upload Linux ZIP
        uses: actions/upload-artifact@v7
        with:
          name: linux-zip-${{ matrix.arch }}
          path: linux_decode-light_*_${{ matrix.artifact_suffix }}.zip
          if-no-files-found: error

  release:
    name: Publish Linux release assets
    runs-on: ubuntu-24.04
    needs:
      - build-decode
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then
              echo "release_tag is required when create_release=true" >&2
              exit 1
            fi
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag "$TAG" "$GITHUB_SHA"
              git push origin "$TAG"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/**/linux_decode-light_*_x86_64.zip
            release-assets/**/linux_decode-light_*_arm64.zip