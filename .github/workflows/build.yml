name: Build and release binary

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release and upload built assets"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Tag to release when manually dispatched (example: v0.6.0)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-decode:
    name: Build decode-rust-gui EXE (x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build tape-decode core (Windows x86-64 v1-v4, for bundling)
        shell: bash
        run: |
          set -euo pipefail
          build_level() {
            local level="$1"
            local rustflags=""
            case "$level" in
              v1) rustflags="-C target-feature=+sse2" ;;
              v2) rustflags="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2" ;;
              v3) rustflags="-C target-feature=+avx,+avx2" ;;
              v4) rustflags="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl" ;;
            esac
            echo "::group::Build Windows ${level}"
            CARGO_TARGET_DIR="target-x86-64-${level}" RUSTFLAGS="$rustflags" \
              cargo build --release --target x86_64-pc-windows-msvc --bin tape-decode
            echo "::endgroup::"
          }
          for level in v1 v2 v3 v4; do
            build_level "$level"
          done

      - name: List built Windows core binaries (for bundling)
        shell: bash
        run: |
          set -euo pipefail
          ls -la target-x86-64-v*/x86_64-pc-windows-msvc/release/tape-decode.exe 2>/dev/null || true
          ls -la target/x86_64-pc-windows-msvc/release/tape-decode.exe 2>/dev/null || true

      - name: Test Rust core
        shell: bash
        run: cargo test --workspace --release

      - name: Smoke test raw tape-decode binary (Windows)
        shell: bash
        run: |
          set -euo pipefail
          # Prefer a level binary (lowest first) so it runs on any x86-64 host
          BIN=""
          for lvl in v1 v2 v3 v4; do
            p="target-x86-64-${lvl}/x86_64-pc-windows-msvc/release/tape-decode.exe"
            if [ -f "$p" ]; then BIN="$p"; break; fi
          done
          if [ -z "$BIN" ]; then BIN="target/x86_64-pc-windows-msvc/release/tape-decode.exe"; fi
          if [ ! -f "$BIN" ]; then
            echo "No tape-decode.exe found for smoke test"; ls -la target*/x86_64-pc-windows-msvc/release/ || true; exit 1
          fi
          echo "Smoking: $BIN"
          TAPE_DECODE_MICROARCH=x86-64-v1 "$BIN" list-profiles | tee /tmp/tape_decode_profiles.txt
          grep -q "PAL_VHS" /tmp/tape_decode_profiles.txt

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install launcher packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyinstaller pyinstaller-versionfile -r requirements-launcher.txt

      - name: Build decode launcher (Windows x86-64 v1-v4)
        shell: bash
        run: python scripts/ci/build-windows-decode-bin.py

      - name: Package decode-rust-gui Windows artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          EXE="dist/decode-rust-gui.exe"
          if [ ! -f "$EXE" ]; then
            echo "decode-rust-gui.exe not produced"
            ls -la dist/ || true
            exit 1
          fi
          cp "$EXE" "decode-rust-gui-windows_${VERSION}_x86_64.exe"

      - name: Upload decode-rust-gui Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: decode-rust-gui-windows-x86_64
          path: |
            decode-rust-gui-windows_*_x86_64.exe
          if-no-files-found: warn

  linux-decode:
    name: Linux decode-rust-gui AppImage (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            appimagetool: appimagetool-x86_64.AppImage
            appimage_arch: x86_64
            artifact_suffix: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            appimagetool: appimagetool-aarch64.AppImage
            appimage_arch: aarch64
            artifact_suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build tape-decode core (single, for bundling)
        if: matrix.arch != 'x86_64'
        run: cargo build --release --target "${{ matrix.target }}" --bin tape-decode

      - name: Build tape-decode core (x86-64 v1-v4 levels, for bundling)
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          build_level() {
            local level="$1"
            local rustflags=""
            case "$level" in
              v1) rustflags="-C target-feature=+sse2" ;;
              v2) rustflags="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2" ;;
              v3) rustflags="-C target-feature=+avx,+avx2" ;;
              v4) rustflags="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl" ;;
            esac
            echo "::group::Build ${level}"
            CARGO_TARGET_DIR="target-x86-64-${level}" RUSTFLAGS="$rustflags" \
              cargo build --release --target "${{ matrix.target }}" --bin tape-decode
            echo "::endgroup::"
          }
          for level in v1 v2 v3 v4; do
            build_level "$level"
          done

      - name: Test Rust core
        run: cargo test --workspace --release

      - name: Smoke test raw tape-decode binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            BIN=""
            for lvl in v1 v2 v3 v4; do
              p="target-x86-64-${lvl}/x86_64-unknown-linux-gnu/release/tape-decode"
              if [ -f "$p" ]; then BIN="$p"; break; fi
            done
            if [ -z "$BIN" ]; then BIN="target/x86_64-unknown-linux-gnu/release/tape-decode"; fi
            if [ ! -f "$BIN" ]; then
              echo "No tape-decode binary found for smoke"; ls -la target*/x86_64-unknown-linux-gnu/release/ || true; exit 1
            fi
            echo "Smoking: $BIN"
            TAPE_DECODE_MICROARCH=x86-64-v1 "$BIN" list-profiles | tee /tmp/tape_decode_profiles.txt
            grep -q "PAL_VHS" /tmp/tape_decode_profiles.txt
          else
            BIN="target/aarch64-unknown-linux-gnu/release/tape-decode"
            if [ ! -f "$BIN" ]; then
              echo "No tape-decode binary found for smoke"; ls -la target/aarch64-unknown-linux-gnu/release/ || true; exit 1
            fi
            echo "Smoking: $BIN"
            "$BIN" list-profiles | tee /tmp/tape_decode_profiles.txt
            grep -q "PAL_VHS" /tmp/tape_decode_profiles.txt
          fi

      - name: Setup Python (for decode launcher)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system libraries needed for complete PyQt6 xcb plugin collection
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render0 libxcb-render-util0 libxcb-shape0 libxcb-shm0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon0 || true

      - name: Install launcher packaging dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller -r requirements-launcher.txt

      - name: Build launcher binary
        if: matrix.arch != 'x86_64'
        env:
          TAPE_DECODE_BIN: target/${{ matrix.target }}/release/tape-decode
        run: python3 scripts/ci/build-linux-decode-bin.py

      - name: Build launcher binary (with microarch levels)
        if: matrix.arch == 'x86_64'
        run: python3 scripts/ci/build-linux-decode-bin.py

      - name: Build AppDir and AppImage
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/decode-rust-gui AppDir/usr/bin/decode-rust-gui
          chmod +x AppDir/usr/bin/decode-rust-gui

          cp resources/appimage/decode-rust-gui.desktop AppDir/usr/share/applications/decode-rust-gui.desktop
          cp resources/appimage/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp resources/icon/tape-decode-rust-256.png AppDir/usr/share/icons/hicolor/256x256/apps/decode-rust-gui.png
          cp resources/icon/tape-decode-rust-256.png AppDir/decode-rust-gui.png

          # Stage icon resources tree so launcher runtime can discover PNG for setWindowIcon/taskbar
          mkdir -p AppDir/resources/icon
          cp resources/icon/tape-decode-rust-256.png AppDir/resources/icon/
          cp resources/icon/tape-decode-rust-256.png AppDir/tape-decode-rust-256.png || true
          cp resources/icon/tape-decode-rust-256.png AppDir/decode-rust-gui.png

          # .DirIcon is critical for the AppImage to show its icon in file managers and taskbars
          cp resources/icon/tape-decode-rust-256.png AppDir/.DirIcon || true
          ln -sf decode-rust-gui.png AppDir/.DirIcon 2>/dev/null || cp AppDir/decode-rust-gui.png AppDir/.DirIcon || true

          ln -sf usr/share/applications/decode-rust-gui.desktop AppDir/decode-rust-gui.desktop

          APPIMAGE_TOOL="${{ matrix.appimagetool }}"
          APPIMAGE_NAME="decode-rust-gui-linux_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.AppImage"

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/${APPIMAGE_TOOL}"
          chmod +x "${APPIMAGE_TOOL}"
          "./${APPIMAGE_TOOL}" --appimage-extract
          env -u SOURCE_DATE_EPOCH ARCH=${{ matrix.appimage_arch }} ./squashfs-root/AppRun AppDir "${APPIMAGE_NAME}"
          chmod +x "${APPIMAGE_NAME}"

          # Only force a microarch level on x86-64 builds. On arm64 the bundled binary is aarch64.
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            TAPE_DECODE_MICROARCH=x86-64-v1 APPIMAGE_EXTRACT_AND_RUN=1 "./${APPIMAGE_NAME}" list-profiles > /tmp/decode-rust-gui_profiles.txt || true
          else
            APPIMAGE_EXTRACT_AND_RUN=1 "./${APPIMAGE_NAME}" list-profiles > /tmp/decode-rust-gui_profiles.txt || true
          fi
          grep -q "PAL_VHS" /tmp/decode-rust-gui_profiles.txt || true

          ZIP_NAME="decode-rust-gui-linux_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.zip"
          zip -j "${ZIP_NAME}" "${APPIMAGE_NAME}"
          test -f "${ZIP_NAME}"
          test "$(unzip -Z1 "${ZIP_NAME}" | wc -l)" -eq 1

      - name: Upload decode-rust-gui Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: decode-rust-gui-linux-${{ matrix.artifact_suffix }}
          path: |
            decode-rust-gui-linux_*_${{ matrix.artifact_suffix }}.zip
            decode-rust-gui-linux_*_${{ matrix.artifact_suffix }}.AppImage
          if-no-files-found: warn

  macos-decode:
    name: macOS decode-rust-gui DMG (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            artifact_suffix: x86_64
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build tape-decode core (single, for bundling)
        if: matrix.arch != 'x86_64'
        run: cargo build --release --target "${{ matrix.target }}" --bin tape-decode

      - name: Build tape-decode core (x86-64 v1-v4 levels, for bundling)
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          build_level() {
            local level="$1"
            local rustflags=""
            case "$level" in
              v1) rustflags="-C target-feature=+sse2" ;;
              v2) rustflags="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2" ;;
              v3) rustflags="-C target-feature=+avx,+avx2" ;;
              v4) rustflags="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl" ;;
            esac
            echo "::group::Build ${level}"
            CARGO_TARGET_DIR="target-x86-64-${level}" RUSTFLAGS="$rustflags" \
              cargo build --release --target "${{ matrix.target }}" --bin tape-decode
            echo "::endgroup::"
          }
          for level in v1 v2 v3 v4; do
            build_level "$level"
          done

      - name: Test Rust core
        run: cargo test --workspace --release

      - name: Smoke test raw tape-decode binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            BIN=""
            for lvl in v1 v2 v3 v4; do
              p="target-x86-64-${lvl}/x86_64-apple-darwin/release/tape-decode"
              if [ -f "$p" ]; then BIN="$p"; break; fi
            done
            if [ -z "$BIN" ]; then BIN="target/x86_64-apple-darwin/release/tape-decode"; fi
            if [ ! -f "$BIN" ]; then
              echo "No tape-decode binary found for smoke"; ls -la target*/x86_64-apple-darwin/release/ || true; exit 1
            fi
            echo "Smoking: $BIN"
            TAPE_DECODE_MICROARCH=x86-64-v1 "$BIN" list-profiles | tee /tmp/tape_decode_profiles.txt
            grep -q "PAL_VHS" /tmp/tape_decode_profiles.txt
          else
            BIN="target/aarch64-apple-darwin/release/tape-decode"
            if [ ! -f "$BIN" ]; then
              echo "No tape-decode binary found for smoke"; ls -la target/aarch64-apple-darwin/release/ || true; exit 1
            fi
            echo "Smoking: $BIN"
            "$BIN" list-profiles | tee /tmp/tape_decode_profiles.txt
            grep -q "PAL_VHS" /tmp/tape_decode_profiles.txt
          fi

      - name: Setup Python (for decode launcher)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install launcher packaging dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller -r requirements-launcher.txt

      - name: Build launcher binary
        if: matrix.arch != 'x86_64'
        env:
          TAPE_DECODE_BIN: target/${{ matrix.target }}/release/tape-decode
        run: python3 scripts/ci/build-macos-decode-bin.py

      - name: Build launcher binary (with microarch levels)
        if: matrix.arch == 'x86_64'
        run: python3 scripts/ci/build-macos-decode-bin.py

      - name: Ad-hoc sign app bundle
        run: codesign -s - --deep --force dist/decode-rust-gui.app

      - name: Package decode-rust-gui macOS DMG
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          DMG_NAME="decode-rust-gui-macos_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.dmg"
          ZIP_NAME="decode-rust-gui-macos_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.zip"
          rm -rf build/dmg
          mkdir -p build/dmg
          cp -R dist/decode-rust-gui.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "decode-rust-gui" -srcfolder build/dmg -ov -format UDZO "$DMG_NAME"
          test -f "$DMG_NAME"

          # zip the DMG (consistent with Linux AppImage packaging)
          zip -j "$ZIP_NAME" "$DMG_NAME"
          test -f "$ZIP_NAME"
          test "$(unzip -Z1 "$ZIP_NAME" | wc -l)" -eq 1

          # smoke (force v1 on x86-64, none on arm)
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            TAPE_DECODE_MICROARCH=x86-64-v1 dist/decode-rust-gui.app/Contents/MacOS/decode-rust-gui list-profiles > /tmp/decode-rust-gui_profiles.txt || true
          else
            dist/decode-rust-gui.app/Contents/MacOS/decode-rust-gui list-profiles > /tmp/decode-rust-gui_profiles.txt || true
          fi
          grep -q "PAL_VHS" /tmp/decode-rust-gui_profiles.txt || true

      - name: Upload decode-rust-gui macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: decode-rust-gui-macos-${{ matrix.artifact_suffix }}
          path: |
            decode-rust-gui-macos_*_${{ matrix.artifact_suffix }}.dmg
            decode-rust-gui-macos_*_${{ matrix.artifact_suffix }}.zip
          if-no-files-found: warn

  release:
    name: Create GitHub release
    needs: [windows-decode, linux-decode, macos-decode]
    if: github.event_name == 'workflow_dispatch' && inputs.create_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "decode-rust-gui v${{ steps.version.outputs.version }}"
          draft: true
          body: |
            ## Decode Launcher (decode-rust-gui)

            This release ships the Decode Launcher ("decode-rust-gui") with built-in support for x86-64 microarchitecture level selection (Auto / v1 / v2 / v3 / v4).

            The decode-rust-gui binary is the primary artifact. It provides the GUI when launched normally, and full CLI functionality when invoked from a terminal (e.g. `decode-rust-gui list-profiles`, `decode-rust-gui decode ...`). No separate raw tape-decode binary is released.

            ### Included
            - decode-rust-gui launcher for:
              - Windows (x86-64)
              - Linux (x86-64 + arm64 AppImage)
              - macOS (x86-64 + arm64)
            - 9 GUI artifacts total: 1 Windows exe, 4 Linux (AppImage+zip × 2), 4 macOS (DMG+zip × 2).
            - The tape-decode core implementation is bundled inside (v1 default + v2/v3/v4 level-optimized variants for x86-64 where applicable).
            - Profiles list and list-profiles verification included.

            ### x86-64 Microarchitecture Levels
            - Auto detects best available.
            - Explicit levels use targeted RUSTFLAGS:
              - v1: `-C target-feature=+sse2`
              - v2: `-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2`
              - v3: `-C target-feature=+avx,+avx2`
              - v4: `-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl`

            ## Auto-generated notes
          generate_release_notes: true
          append_body: true
          files: |
            artifacts/decode-rust-gui-windows-x86_64/*.exe
            artifacts/decode-rust-gui-linux-x86_64/*.zip
            artifacts/decode-rust-gui-linux-x86_64/*.AppImage
            artifacts/decode-rust-gui-linux-arm64/*.zip
            artifacts/decode-rust-gui-linux-arm64/*.AppImage
            artifacts/decode-rust-gui-macos-x86_64/*.dmg
            artifacts/decode-rust-gui-macos-x86_64/*.zip
            artifacts/decode-rust-gui-macos-arm64/*.dmg
            artifacts/decode-rust-gui-macos-arm64/*.zip
