name: Build and release binary

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release and upload built assets"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Tag to release when manually dispatched (example: v0.6.0)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-cli:
    name: Windows CLI build (x86-64 v1-v4)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build tape-decode CLI (Windows x86-64 v1-v4)
        shell: bash
        run: |
          set -euo pipefail
          declare -A TARGET_MAP=(
            [v1]=x86_64-pc-windows-msvc
            [v2]=x86_64-pc-windows-msvc
            [v3]=x86_64-pc-windows-msvc
            [v4]=x86_64-pc-windows-msvc
          )
          declare -A RUSTFLAGS_MAP=(
            [v1]="-C target-feature=+sse2"
            [v2]="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2"
            [v3]="-C target-feature=+avx,+avx2"
            [v4]="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl"
          )
          LEVELS=(v1 v2 v3 v4)
          for LEVEL in "${LEVELS[@]}"; do
            echo "::group::Build Windows ${LEVEL}"
            RUSTFLAGS="${RUSTFLAGS_MAP[$LEVEL]}" \
              cargo build --release --target "${TARGET_MAP[$LEVEL]}" --bin tape-decode
            echo "::endgroup::"
          done

      - name: List built Windows binaries
        shell: bash
        run: |
          set -euo pipefail
          ls -la target/x86_64-pc-windows-msvc/release/tape-decode.exe

      - name: Package Windows binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p "release/windows-x86_64"
          LEVELS=(v1 v2 v3 v4)
          for LEVEL in "${LEVELS[@]}"; do
            mkdir -p "release/windows-x86_64/tape-decode-${LEVEL}"
            cp "target/x86_64-pc-windows-msvc/release/tape-decode.exe" \
               "release/windows-x86_64/tape-decode-${LEVEL}/tape-decode.exe"
          done
          7z a "release/tape-decode-windows-x86_64-v${VERSION}.zip" "release/windows-x86_64"
          echo "WINDOWS_RELEASE_ASSET=release/tape-decode-windows-x86_64-v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tape-decode-windows-x86_64
          path: |
            release/windows-x86_64/tape-decode-*/tape-decode.exe
            release/tape-decode-windows-x86_64-*.zip
          if-no-files-found: error

  linux-cli:
    name: Linux CLI build (x86-64 v1-v4 + aarch64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install aarch64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build tape-decode CLI (Linux x86-64 v1-v4 + aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          build_level() {
            local level="$1"
            local target=""
            local rustflags=""
            case "$level" in
              v1)
                target="x86_64-unknown-linux-gnu"
                rustflags="-C target-feature=+sse2"
                ;;
              v2)
                target="x86_64-unknown-linux-gnu"
                rustflags="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2"
                ;;
              v3)
                target="x86_64-unknown-linux-gnu"
                rustflags="-C target-feature=+avx,+avx2"
                ;;
              v4)
                target="x86_64-unknown-linux-gnu"
                rustflags="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl"
                ;;
              aarch64)
                target="aarch64-unknown-linux-gnu"
                rustflags=""
                ;;
            esac
            echo "::group::Build ${level}"
            RUSTFLAGS="$rustflags" cargo build --release --target "$target" --bin tape-decode
            echo "::endgroup::"
          }
          for level in v1 v2 v3 v4 aarch64; do
            build_level "$level"
          done

      - name: Package Linux binaries
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          LEVELS=(v1 v2 v3 v4)
          for LEVEL in "${LEVELS[@]}"; do
            mkdir -p "release/linux-x86_64/tape-decode-${LEVEL}"
            cp "target/x86_64-unknown-linux-gnu/release/tape-decode" \
               "release/linux-x86_64/tape-decode-${LEVEL}/tape-decode"
          done
          mkdir -p "release/linux-aarch64"
          cp "target/aarch64-unknown-linux-gnu/release/tape-decode" \
             "release/linux-aarch64/tape-decode"
          tar -C release -czf "release/tape-decode-linux-x86_64-v${VERSION}.tar.gz" "linux-x86_64"
          tar -C release -czf "release/tape-decode-linux-aarch64-v${VERSION}.tar.gz" "linux-aarch64"
          echo "LINUX_X86_64_ASSET=release/tape-decode-linux-x86_64-v${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "LINUX_AARCH64_ASSET=release/tape-decode-linux-aarch64-v${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tape-decode-linux
          path: |
            release/linux-x86_64/tape-decode-*/tape-decode
            release/linux-aarch64/tape-decode
            release/tape-decode-linux-*-v*.tar.gz
          if-no-files-found: error

  macos-cli:
    name: macOS CLI build (x86-64 v1-v4 + aarch64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve build version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git describe --tags --always --dirty)"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build tape-decode CLI (macOS x86-64 v1-v4 + aarch64)
        run: |
          set -euo pipefail
          build_level() {
            local level="$1"
            local target=""
            local rustflags=""
            case "$level" in
              v1)
                target="x86_64-apple-darwin"
                rustflags="-C target-feature=+sse2"
                ;;
              v2)
                target="x86_64-apple-darwin"
                rustflags="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2"
                ;;
              v3)
                target="x86_64-apple-darwin"
                rustflags="-C target-feature=+avx,+avx2"
                ;;
              v4)
                target="x86_64-apple-darwin"
                rustflags="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl"
                ;;
              aarch64)
                target="aarch64-apple-darwin"
                rustflags=""
                ;;
            esac
            echo "::group::Build ${level}"
            RUSTFLAGS="$rustflags" cargo build --release --target "$target" --bin tape-decode
            echo "::endgroup::"
          }
          for level in v1 v2 v3 v4 aarch64; do
            build_level "$level"
          done

      - name: Package macOS binaries
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          LEVELS=(v1 v2 v3 v4)
          for LEVEL in "${LEVELS[@]}"; do
            mkdir -p "release/macos-x86_64/tape-decode-${LEVEL}"
            cp "target/x86_64-apple-darwin/release/tape-decode" \
               "release/macos-x86_64/tape-decode-${LEVEL}/tape-decode"
          done
          mkdir -p "release/macos-aarch64"
          cp "target/aarch64-apple-darwin/release/tape-decode" \
             "release/macos-aarch64/tape-decode"
          tar -C release -czf "release/tape-decode-macos-x86_64-v${VERSION}.tar.gz" "macos-x86_64"
          tar -C release -czf "release/tape-decode-macos-aarch64-v${VERSION}.tar.gz" "macos-aarch64"
          echo "MACOS_X86_64_ASSET=release/tape-decode-macos-x86_64-v${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "MACOS_AARCH64_ASSET=release/tape-decode-macos-aarch64-v${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tape-decode-macos
          path: |
            release/macos-x86_64/tape-decode-*/tape-decode
            release/macos-aarch64/tape-decode
            release/tape-decode-macos-*-v*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: [windows-cli, linux-cli, macos-cli]
    if: github.event_name == 'workflow_dispatch' && inputs.create_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "tape-decode v${{ steps.version.outputs.version }}"
          draft: true
          body: |
            ## x86-64 Version Profiles (Microarchitecture Levels)

            This release adds selectable x86-64 microarchitecture level builds (v1/v2/v3/v4) plus aarch64.

            ### Launcher
            - Dropdown in Decode Launcher GUI to choose target level: Auto / v1 / v2 / v3 / v4.
            - Auto detects and uses the native-optimized binary when available.
            - "Build level..." and "Locate binary" helpers for the selected level.
            - Level choice propagates to command preview, environment variables, and launch.

            ### Prebuilt Binaries
            - Separate optimized `tape-decode` binaries per level using targeted RUSTFLAGS:
              - v1: `-C target-feature=+sse2`
              - v2: `-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2`
              - v3: `-C target-feature=+avx,+avx2`
              - v4: `-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl`
            - Platforms: Windows (x86-64 v1-v4), Linux (x86-64 v1-v4 + aarch64), macOS (x86-64 v1-v4 + aarch64).

            ### CI / Build Changes
            - Cross targets explicitly installed via `dtolnay/rust-toolchain` (Linux aarch64; macOS x86_64 + aarch64).
            - Linux aarch64: install `gcc-aarch64-linux-gnu` and set `CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER`.
            - Portable case-based `build_level()` helpers replace associative arrays to avoid "unbound variable" errors under `set -euo pipefail`.
            - All packaging loops hardened with quoted arrays.

            Artifacts are laid out under per-level directories inside the platform zips/tarballs.

            ## Auto-generated notes
          generate_release_notes: true
          append_body: true
          files: |
            artifacts/tape-decode-windows-x86_64/*.zip
            artifacts/tape-decode-linux/tape-decode-linux-*.tar.gz
            artifacts/tape-decode-macos/tape-decode-macos-*.tar.gz
