name: "Build macOS decode launcher"

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release and upload built assets"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Tag to release when manually dispatched (example: v0.6.0)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-decode:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            target: aarch64-apple-darwin
            artifact_suffix: arm64
          - os: macos-15-intel
            arch: x86_64
            target: x86_64-apple-darwin
            artifact_suffix: x86_64

    name: Build decode-rust-gui DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    env:
      SETUPTOOLS_RUST_CARGO_PROFILE: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(bash scripts/ci/git-version.sh)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build tape-decode binary (single)
        if: matrix.arch != 'x86_64'
        run: cargo build --release --target "${{ matrix.target }}" --bin tape-decode

      - name: Build tape-decode binaries (x86-64 v1-v4)
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          build_level() {
            local level="$1"
            local rustflags=""
            case "$level" in
              v1) rustflags="-C target-feature=+sse2" ;;
              v2) rustflags="-C target-feature=+sse3,+ssse3,+sse4.1,+sse4.2" ;;
              v3) rustflags="-C target-feature=+avx,+avx2" ;;
              v4) rustflags="-C target-feature=+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl" ;;
            esac
            echo "::group::Build ${level}"
            CARGO_TARGET_DIR="target-x86-64-${level}" RUSTFLAGS="$rustflags" \
              cargo build --release --target "${{ matrix.target }}" --bin tape-decode
            echo "::endgroup::"
          }
          for level in v1 v2 v3 v4; do
            build_level "$level"
          done

      - name: Install launcher packaging dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller -r requirements-launcher.txt

      - name: Build app bundle
        if: matrix.arch != 'x86_64'
        env:
          TAPE_DECODE_BIN: target/${{ matrix.target }}/release/tape-decode
        run: python3 scripts/ci/build-macos-decode-bin.py

      - name: Build app bundle (with microarch levels)
        if: matrix.arch == 'x86_64'
        # TAPE_DECODE_BIN omitted; packaging script discovers target-x86-64-vN/...
        run: python3 scripts/ci/build-macos-decode-bin.py

      - name: Ad-hoc sign app bundle
        run: codesign -s - --deep --force dist/decode-rust-gui.app

      - name: Build and verify DMG
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          DMG_NAME="decode-rust-gui-macos_${BUILD_VERSION}_${{ matrix.artifact_suffix }}.dmg"
          rm -rf build/dmg
          mkdir -p build/dmg
          cp -R dist/decode-rust-gui.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "decode-rust-gui" -srcfolder build/dmg -ov -format UDZO "$DMG_NAME"
          test -f "$DMG_NAME"
          TAPE_DECODE_MICROARCH=x86-64-v1 dist/decode-rust-gui.app/Contents/MacOS/decode-rust-gui list-profiles > /tmp/decode-rust-gui_profiles.txt
          grep -q "PAL_VHS" /tmp/decode-rust-gui_profiles.txt

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: decode-rust-gui-macos_*_${{ matrix.artifact_suffix }}.dmg
          if-no-files-found: error

  release:
    name: Publish macOS release assets
    runs-on: ubuntu-24.04
    needs:
      - build-decode
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then
              echo "release_tag is required when create_release=true" >&2
              exit 1
            fi
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag "$TAG" "$GITHUB_SHA"
              git push origin "$TAG"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/**/decode-rust-gui-macos_*_x86_64.dmg
            release-assets/**/decode-rust-gui-macos_*_arm64.dmg
